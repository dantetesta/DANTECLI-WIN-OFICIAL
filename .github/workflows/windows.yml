name: Windows

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        config: [Debug, Release]

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.6.*
          # QuickControls2 vem junto do qtdeclarative
          modules: qtmultimedia
          archives: qtbase qtdeclarative

      - name: Configure
        run: cmake -B build

      - name: Build
        run: cmake --build build --config ${{ matrix.config }}
