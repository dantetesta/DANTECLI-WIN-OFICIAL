name: Windows

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        config: [Debug, Release]

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.6.*
          # QuickControls2 vem junto do qtdeclarative
          modules: qtmultimedia
          archives: qtbase qtdeclarative

      - name: Configure
        run: cmake -B build -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build build --config ${{ matrix.config }}

      - name: Test (ctest — spawna cmd.exe via ConPTY de verdade)
        run: ctest --test-dir build -C ${{ matrix.config }} --output-on-failure

      - name: Empacotar (Release — windeployqt + zip portátil)
        if: matrix.config == 'Release'
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path build -Recurse -Filter DanteCLI.exe -ErrorAction SilentlyContinue |
                 Where-Object { $_.FullName -match '\\Release\\' } | Select-Object -First 1
          if (-not $exe) {
            $exe = Get-ChildItem -Path build -Recurse -Filter DanteCLI.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          }
          if (-not $exe) {
            Write-Host "DanteCLI.exe NAO encontrado. Exes em build/:"
            Get-ChildItem build -Recurse -Filter *.exe | ForEach-Object FullName
            exit 1
          }
          Write-Host "exe: $($exe.FullName)"
          $deploy = "deploy/DanteCLI"
          New-Item -ItemType Directory -Force -Path $deploy | Out-Null
          Copy-Item $exe.FullName "$deploy/"
          & "$env:QT_ROOT_DIR/bin/windeployqt.exe" --release --qmldir app/qml "$deploy/DanteCLI.exe"
          Compress-Archive -Path "$deploy/*" -DestinationPath "DanteCLI-portatil.zip" -Force
          Write-Host "Conteúdo do pacote:"; Get-ChildItem $deploy -Name

      - name: Instalador (Inno Setup — best-effort)
        if: matrix.config == 'Release'
        continue-on-error: true
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer/dante.iss

      - name: Upload artefatos Windows
        if: matrix.config == 'Release'
        uses: actions/upload-artifact@v4
        with:
          name: DanteCLI-windows
          path: |
            DanteCLI-portatil.zip
            installer/Output/*.exe
          if-no-files-found: warn
