name: Windows

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        config: [Debug, Release]

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.6.*
          # QuickControls2 vem junto do qtdeclarative
          modules: qtmultimedia
          archives: qtbase qtdeclarative

      - name: Configure
        run: cmake -B build -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build build --config ${{ matrix.config }}

      - name: Test (ctest — spawna cmd.exe via ConPTY de verdade)
        run: ctest --test-dir build -C ${{ matrix.config }} --output-on-failure

      - name: Empacotar (Release — windeployqt + zip portátil)
        if: matrix.config == 'Release'
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path build -Recurse -Filter DanteCLI.exe -ErrorAction SilentlyContinue |
                 Where-Object { $_.FullName -match '\\Release\\' } | Select-Object -First 1
          if (-not $exe) {
            $exe = Get-ChildItem -Path build -Recurse -Filter DanteCLI.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          }
          if (-not $exe) {
            Write-Host "DanteCLI.exe NAO encontrado. Exes em build/:"
            Get-ChildItem build -Recurse -Filter *.exe | ForEach-Object FullName
            exit 1
          }
          Write-Host "exe: $($exe.FullName)"
          $deploy = "deploy/DanteCLI"
          New-Item -ItemType Directory -Force -Path $deploy | Out-Null
          Copy-Item $exe.FullName "$deploy/"
          & "$env:QT_ROOT_DIR/bin/windeployqt.exe" --release --compiler-runtime --qmldir app/qml "$deploy/DanteCLI.exe"
          # Bundla o runtime do MSVC. --compiler-runtime nem sempre acha (precisa do env do
          # VS), então copiamos do System32 do runner. vcruntime140_1.dll em especial falta
          # em muitas máquinas e é o clássico "o app nem abre".
          $crt = "vcruntime140.dll","vcruntime140_1.dll","msvcp140.dll","msvcp140_1.dll","concrt140.dll"
          foreach ($d in $crt) {
            $src = Join-Path $env:SystemRoot "System32\$d"
            if (Test-Path $src) { Copy-Item $src "$deploy/"; Write-Host "runtime: $d" }
            else { Write-Host "runtime AUSENTE no runner: $d" }
          }
          Compress-Archive -Path "$deploy/*" -DestinationPath "DanteCLI-portatil.zip" -Force
          Write-Host "Conteúdo do pacote:"; Get-ChildItem $deploy -Name

      - name: Smoke do app (roda o .exe empacotado no runner Windows)
        if: matrix.config == 'Release'
        shell: pwsh
        env:
          QT_QPA_PLATFORM: offscreen
          QT_QUICK_BACKEND: software
        run: |
          $exe = "deploy/DanteCLI/DanteCLI.exe"
          Write-Host "Rodando $exe --selftest (offscreen)..."
          $p = Start-Process $exe -ArgumentList "--selftest" -Wait -PassThru
          Write-Host "EXIT=$($p.ExitCode)"
          $log = Join-Path $env:LOCALAPPDATA "DANTE CLI\logs\dante.log"
          if (Test-Path $log) { Write-Host "--- dante.log ---"; Get-Content $log -Tail 40 }
          else { Write-Host "(sem dante.log — app morreu antes do main)" }
          if (Test-Path "deploy/DanteCLI/dante-selftest.png") {
            Copy-Item "deploy/DanteCLI/dante-selftest.png" "DanteCLI-screenshot.png"; Write-Host "screenshot ok"
          } else { Write-Host "(sem screenshot)" }
          if ($p.ExitCode -ne 0) { throw "App NAO passou no selftest (exit=$($p.ExitCode))" }

      - name: Instalador (Inno Setup — best-effort)
        if: matrix.config == 'Release'
        continue-on-error: true
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer/dante.iss

      - name: Upload artefatos Windows
        if: ${{ always() && matrix.config == 'Release' }}
        uses: actions/upload-artifact@v4
        with:
          name: DanteCLI-windows
          path: |
            DanteCLI-portatil.zip
            installer/Output/*.exe
            DanteCLI-screenshot.png
          if-no-files-found: warn
